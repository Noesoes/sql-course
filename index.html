<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Interactive Course</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1d212c; --border:#2a2f3d;
    --text:#e6e8ee; --dim:#9aa3b2; --accent:#5b9dff; --good:#3ecf8e; --bad:#ff5d5d;
    --mono: 'Consolas','SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif;}
  #app{display:flex;height:100vh;}
  #sidebar-toggle{display:none;position:fixed;left:14px;top:14px;z-index:11;width:38px;height:38px;
    padding:0;align-items:center;justify-content:center;font-size:18px;}
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9;}
  #sidebar-overlay.show{display:block;}
  #sidebar{width:280px;flex:0 0 280px;background:var(--panel);border-right:1px solid var(--border);
    overflow-y:auto;padding:14px 0;}
  #sidebar h1{font-size:15px;margin:0 16px 12px;color:var(--text);}
  #progress{margin:0 16px 14px;font-size:12px;color:var(--dim);}
  #progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
  #progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);
    margin:16px 16px 6px;}
  .lesson-item{padding:8px 16px;cursor:pointer;font-size:13.5px;display:flex;align-items:center;gap:8px;
    border-left:3px solid transparent;}
  .lesson-item:hover{background:var(--panel2);}
  .lesson-item.active{background:var(--panel2);border-left-color:var(--accent);color:var(--accent);}
  .check{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);flex:0 0 14px;
    display:flex;align-items:center;justify-content:center;font-size:9px;}
  .check.done{background:var(--good);border-color:var(--good);color:#04150c;}
  #main{flex:1;overflow-y:auto;padding:28px 36px 60px;max-width:980px;}
  h2{margin-top:0;font-size:22px;}
  .lesson-body p{line-height:1.55;color:#c9cdd6;}
  .lesson-body code, code{background:#11141c;border:1px solid var(--border);padding:1px 6px;
    border-radius:4px;font-family:var(--mono);font-size:.92em;color:#ffd479;}
  pre.example{background:#11141c;border:1px solid var(--border);border-radius:8px;padding:12px 14px;
    font-family:var(--mono);font-size:13px;overflow-x:auto;color:#9fd6ff;}
  .task{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;
    margin-top:18px;}
  .task h3{margin:0 0 8px;font-size:14px;color:var(--accent);}
  textarea#editor{width:100%;min-height:90px;background:#0c0e14;color:#e6e8ee;border:1px solid var(--border);
    border-radius:8px;font-family:var(--mono);font-size:14px;padding:10px 12px;resize:vertical;}
  .btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  button{background:var(--accent);color:#06101f;border:none;border-radius:7px;padding:8px 14px;
    font-size:13px;font-weight:600;cursor:pointer;}
  button.secondary{background:transparent;color:var(--dim);border:1px solid var(--border);}
  button.secondary:hover{color:var(--text);border-color:var(--accent);}
  button:active{transform:translateY(1px);}
  #result-area{margin-top:14px;}
  .feedback{margin-top:10px;padding:8px 12px;border-radius:7px;font-size:13px;}
  .feedback.ok{background:rgba(62,207,142,.12);color:var(--good);border:1px solid rgba(62,207,142,.4);}
  .feedback.err{background:rgba(255,93,93,.12);color:var(--bad);border:1px solid rgba(255,93,93,.4);}
  table.result{border-collapse:collapse;font-size:12.5px;margin-top:8px;font-family:var(--mono);}
  table.result th,table.result td{border:1px solid var(--border);padding:4px 9px;text-align:left;}
  table.result th{background:#11141c;color:var(--accent);}
  table.result tr:nth-child(even) td{background:#13151d;}
  .hint{font-size:12.5px;color:var(--dim);margin-top:8px;cursor:pointer;text-decoration:underline;
    display:inline-block;}
  .hintbox{margin-top:6px;font-size:13px;color:#c9cdd6;display:none;}
  .solbox{margin-top:6px;display:none;}
  #schema-panel{position:fixed;right:0;top:0;width:300px;height:100vh;background:var(--panel);
    border-left:1px solid var(--border);transform:translateX(100%);transition:transform .25s, width .2s;
    overflow-y:auto;padding:16px;z-index:5;}
  #schema-panel.open{transform:translateX(0);}
  #schema-panel.wide{width:560px;}
  #schema-toggle{position:fixed;right:16px;top:16px;z-index:6;}
  .tbl-def{margin-bottom:14px;}
  .tbl-def-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .tbl-def h4{margin:0 0 4px;color:var(--accent);font-size:13px;font-family:var(--mono);}
  .tbl-def ul{margin:0;padding-left:16px;font-size:12px;color:#c9cdd6;font-family:var(--mono);}
  .preview-btn{background:transparent;color:var(--dim);border:1px solid var(--border);
    padding:2px 8px;font-size:11px;font-weight:500;border-radius:6px;cursor:pointer;}
  .preview-btn:hover{color:var(--text);border-color:var(--accent);}
  .preview-wrap{margin-top:8px;overflow-x:auto;display:none;}
  .preview-wrap.shown{display:block;}
  .preview-wrap table.result{font-size:11.5px;}
  .preview-wrap th, .preview-wrap td{padding:3px 7px;}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1d212c;
    border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-size:13px;opacity:0;
    transition:opacity .3s;pointer-events:none;}
  .loading{padding:60px;text-align:center;color:var(--dim);}
  .tablewrap{overflow-x:auto;}

  @media (max-width: 768px){
    #sidebar-toggle{display:flex;}
    #sidebar{position:fixed;left:0;top:0;height:100vh;width:78vw;max-width:300px;z-index:10;
      transform:translateX(-100%);transition:transform .25s;padding-top:60px;}
    #sidebar.open{transform:translateX(0);}
    #main{padding:64px 16px 50px;max-width:100%;}
    .btnrow{gap:6px;}
    .btnrow button{padding:10px 13px;font-size:13px;}
    textarea#editor{font-size:16px;}
    #schema-toggle{top:14px;right:14px;padding:9px 12px;}
    #schema-panel, #schema-panel.wide{width:100vw;}
    table.result{font-size:11.5px;}
    table.result th, table.result td{padding:4px 7px;}
  }
</style>
</head>
<body>
<button id="sidebar-toggle" class="secondary" onclick="toggleSidebar()">☰</button>
<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div id="app">
  <div id="sidebar">
    <h1>📘 SQL Interactive Course</h1>
    <div id="progress">Progress: <span id="progress-text">0/0</span>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <div id="lesson-list"></div>
  </div>
  <div id="main"><div class="loading">Loading SQL engine…</div></div>
</div>
<button id="schema-toggle" class="secondary" onclick="toggleSchema()">🗄 Schema</button>
<div id="schema-panel"></div>
<div id="toast"></div>

<script src="sql-wasm-base64.js"></script>
<script src="sql-wasm.js"></script>
<script>
/* ---------- sample database ---------- */

/* ---------- lessons ---------- */
const LESSONS = [
{ id:'what-is-db', section:'Introduction', title:'What is a Database?',
  body:`<p>Welcome! No experience needed — we'll build up from scratch.</p>
  <p>A <b>database</b> is just an organized place to store information, broken into
  <b>tables</b>. Think of a table like a spreadsheet: it has <b>rows</b> (one per item — one row
  per employee, one row per customer) and <b>columns</b> (the fields each item has — a name, a
  price, a date).</p>
  <p>This course gives you a small pretend company database to practice on, with tables like
  <code>employees</code>, <code>customers</code>, and <code>products</code>. You can see exactly
  what's inside any table anytime — click the <b>🗄 Schema</b> button in the top-right corner of the
  screen, then click <b>👁 view data</b> next to a table name.</p>
  <p>Go ahead and try that now if you like — then come back and run the exercise below.</p>`,
  task:`Every exercise in this course gives you a box to type SQL into, and a <b>Run</b> button.
  Let's try it: type the query below into the box (or it may already be there) and click
  <b>▶ Run</b> to see the <code>customers</code> table's data appear underneath. Then click
  <b>✓ Check Answer</b>.`,
  starter:`SELECT * FROM customers;`,
  solution:`SELECT * FROM customers;`,
  hint:`Just click Run with the query already in the box — that's it!`
},
{ id:'what-is-sql', section:'Introduction', title:'What is SQL?',
  body:`<p><b>SQL</b> (pronounced "sequel" or spelled out "S-Q-L") stands for
  <i>Structured Query Language</i>. It's a language for asking a database questions — "show me
  all the customers," "what's the average price?," "which orders are still pending?" — and for
  changing the data when you need to.</p>
  <p>A SQL <b>statement</b> (often called a <b>query</b> when it's a question, like a SELECT) is
  made of <b>keywords</b> (like <code>SELECT</code> and <code>FROM</code>) plus the names of the
  tables and columns you care about. A few things that trip up beginners:</p>
  <ul>
    <li>Keywords are usually written in CAPS by convention, but SQL doesn't actually care about
    case — <code>select</code> works exactly the same as <code>SELECT</code>.</li>
    <li>Statements are traditionally ended with a semicolon <code>;</code> — good habit, even
    though this course's editor doesn't strictly require it for a single statement.</li>
    <li>Text values (like a name) go in <code>'single quotes'</code>. Numbers don't need quotes.</li>
  </ul>`,
  task:`Try writing the same kind of query yourself, for a different table this time. Select
  everything from <code>departments</code>.`,
  starter:`SELECT * FROM departments;`,
  solution:`SELECT * FROM departments;`,
  hint:`SELECT * FROM departments; — same shape as before, just a different table name.`
},
{ id:'tables-rows-cols', section:'Introduction', title:'Tables, Rows & Columns',
  body:`<p>Let's slow down on vocabulary, since it comes up constantly:</p>
  <ul>
    <li>A <b>table</b> holds one kind of thing — e.g. <code>products</code> holds products.</li>
    <li>A <b>row</b> (also called a <b>record</b>) is one single item in that table — one
    specific product.</li>
    <li>A <b>column</b> (also called a <b>field</b>) is one piece of information every row has —
    every product has a <code>name</code>, a <code>category</code>, and a <code>price</code>.</li>
  </ul>
  <p>So far we've used <code>SELECT *</code> to grab <i>every</i> column. Often you only want
  specific ones — just list the column names you want, separated by commas, instead of <code>*</code>:</p>
  <pre class="example">SELECT name, price FROM products;</pre>
  <p>Open the <b>🗄 Schema</b> panel anytime to see exactly which columns each table has — you'll
  need that to know what names are available to ask for.</p>`,
  task:`Select just the <code>name</code> and <code>price</code> columns (not all of them) from
  <code>products</code>.`,
  starter:`SELECT name, price FROM products;`,
  solution:`SELECT name, price FROM products;`,
  hint:`List the column names you want, separated by a comma, right after SELECT.`
},
{ id:'anatomy', section:'Introduction', title:'Anatomy of a Query',
  body:`<p>Every query we've written so far follows the exact same skeleton — this is the
  pattern you'll use constantly throughout the rest of the course:</p>
  <pre class="example">SELECT  column1, column2   -- which columns do you want?
FROM    table_name         -- which table are they in?
;                           -- this ends the statement</pre>
  <p>(The <code>-- text</code> bits above are <b>comments</b> — SQL ignores anything after
  <code>--</code> on a line. They're just notes for humans reading the query, not instructions.)</p>
  <p>That's the whole foundation. Everything coming up next — filtering rows, sorting, combining
  tables, calculating totals — just adds more pieces onto this same <code>SELECT ... FROM ...</code>
  skeleton.</p>`,
  task:`One more for practice: select the <code>name</code> and <code>city</code> columns from
  <code>customers</code>.`,
  starter:`SELECT name, city FROM customers;`,
  solution:`SELECT name, city FROM customers;`,
  hint:`SELECT name, city FROM customers;`
},
{ id:'intro', section:'Basics', title:'SELECT, recap',
  body:`<p>Quick recap before we pick up the pace: every query you write here runs against a
  <b>real in-browser SQLite database</b> seeded with company data — departments, employees,
  customers, products, orders and order_items.</p>
  <pre class="example">SELECT name, salary FROM employees;</pre>
  <p><code>SELECT</code> picks columns, <code>FROM</code> picks the table. Use <code>*</code> to select all columns.</p>`,
  task:`Select the <code>name</code> and <code>hire_date</code> columns from <code>employees</code>.`,
  starter:`SELECT name, hire_date\nFROM employees;`,
  solution:`SELECT name, hire_date FROM employees;`,
  hint:`Column list goes right after SELECT, table name goes after FROM.`
},
{ id:'where', section:'Basics', title:'Filtering with WHERE',
  body:`<p><code>WHERE</code> filters rows before they're returned. You can compare with
  <code>=</code>, <code>!=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>,
  and combine conditions with <code>AND</code> / <code>OR</code>.</p>
  <pre class="example">SELECT name, salary FROM employees WHERE salary > 90000;</pre>`,
  task:`Find all employees in department <code>1</code> with a salary greater than <code>100000</code>.
  Return <code>name</code> and <code>salary</code>.`,
  starter:`SELECT name, salary\nFROM employees\nWHERE ...`,
  solution:`SELECT name, salary FROM employees WHERE department_id = 1 AND salary > 100000;`,
  hint:`Combine two conditions with AND: department_id = 1 AND salary > 100000.`
},
{ id:'like-in', section:'Basics', title:'LIKE, IN, BETWEEN',
  body:`<p>More filter tools:</p>
  <ul>
   <li><code>LIKE '%pattern%'</code> for partial text match (case-insensitive in SQLite)</li>
   <li><code>IN (1,2,3)</code> to match any value in a list</li>
   <li><code>BETWEEN a AND b</code> for inclusive ranges</li>
  </ul>
  <pre class="example">SELECT name FROM products WHERE category IN ('Furniture','Office Supplies');</pre>`,
  task:`Select the <code>name</code> and <code>price</code> of products priced <code>BETWEEN 20 AND 100</code>.`,
  starter:`SELECT name, price\nFROM products\nWHERE ...`,
  solution:`SELECT name, price FROM products WHERE price BETWEEN 20 AND 100;`,
  hint:`price BETWEEN 20 AND 100`
},
{ id:'order-limit', section:'Basics', title:'ORDER BY & LIMIT',
  body:`<p><code>ORDER BY column DESC/ASC</code> sorts results. <code>LIMIT n</code> caps the number of rows.</p>
  <pre class="example">SELECT name, price FROM products ORDER BY price DESC LIMIT 3;</pre>`,
  task:`Return the 3 highest-paid employees: <code>name</code> and <code>salary</code>, highest first.`,
  starter:`SELECT name, salary\nFROM employees\nORDER BY ...\nLIMIT ...`,
  solution:`SELECT name, salary FROM employees ORDER BY salary DESC LIMIT 3;`,
  hint:`ORDER BY salary DESC, then LIMIT 3.`
},
{ id:'aggregates', section:'Aggregation', title:'Aggregate functions',
  body:`<p>Aggregate functions summarize many rows into one value: <code>COUNT()</code>, <code>SUM()</code>,
  <code>AVG()</code>, <code>MIN()</code>, <code>MAX()</code>.</p>
  <pre class="example">SELECT COUNT(*) AS total_employees, AVG(salary) AS avg_salary FROM employees;</pre>`,
  task:`Find the total number of products and the maximum product price. Name the columns
  <code>total_products</code> and <code>max_price</code>.`,
  starter:`SELECT COUNT(*) AS total_products, MAX(price) AS max_price\nFROM products;`,
  solution:`SELECT COUNT(*) AS total_products, MAX(price) AS max_price FROM products;`,
  hint:`COUNT(*) counts rows; MAX(price) finds the largest price. Use AS to rename columns.`
},
{ id:'groupby', section:'Aggregation', title:'GROUP BY',
  body:`<p><code>GROUP BY</code> buckets rows that share a value, so aggregate functions run per-bucket
  instead of over the whole table.</p>
  <pre class="example">SELECT department_id, COUNT(*) AS headcount
FROM employees
GROUP BY department_id;</pre>`,
  task:`For each <code>category</code> in <code>products</code>, show the category and the average price
  as <code>avg_price</code>.`,
  starter:`SELECT category, AVG(price) AS avg_price\nFROM products\nGROUP BY category;`,
  solution:`SELECT category, AVG(price) AS avg_price FROM products GROUP BY category;`,
  hint:`GROUP BY category, then AVG(price) AS avg_price.`
},
{ id:'having', section:'Aggregation', title:'HAVING',
  body:`<p><code>WHERE</code> filters rows before grouping; <code>HAVING</code> filters groups
  after aggregation.</p>
  <pre class="example">SELECT department_id, AVG(salary) AS avg_salary
FROM employees
GROUP BY department_id
HAVING AVG(salary) > 90000;</pre>`,
  task:`Show each <code>category</code> and its <code>COUNT(*)</code> as <code>num_products</code>,
  but only for categories with more than 2 products.`,
  starter:`SELECT category, COUNT(*) AS num_products\nFROM products\nGROUP BY category\nHAVING ...`,
  solution:`SELECT category, COUNT(*) AS num_products FROM products GROUP BY category HAVING COUNT(*) > 2;`,
  hint:`HAVING COUNT(*) > 2 goes after GROUP BY.`
},
{ id:'inner-join', section:'Joins', title:'INNER JOIN',
  body:`<p>Joins combine rows from two tables based on a matching column. <code>INNER JOIN</code>
  only keeps rows that match in both tables.</p>
  <pre class="example">SELECT e.name, d.name AS department
FROM employees e
INNER JOIN departments d ON e.department_id = d.id;</pre>
  <p>Table aliases (<code>e</code>, <code>d</code>) keep things short when referencing columns.</p>`,
  task:`List each order's <code>id</code> and the customer's <code>name</code>, by joining
  <code>orders</code> with <code>customers</code>.`,
  starter:`SELECT o.id, c.name\nFROM orders o\nJOIN customers c ON ...`,
  solution:`SELECT o.id, c.name FROM orders o JOIN customers c ON o.customer_id = c.id;`,
  hint:`Join condition: o.customer_id = c.id`
},
{ id:'left-join', section:'Joins', title:'LEFT JOIN',
  body:`<p><code>LEFT JOIN</code> keeps every row from the left table, filling in <code>NULL</code>
  for unmatched right-table columns. Useful for finding "things with no related rows".</p>
  <pre class="example">SELECT c.name, o.id AS order_id
FROM customers c
LEFT JOIN orders o ON o.customer_id = c.id
WHERE o.id IS NULL;</pre>`,
  task:`Find employees who are <b>not</b> managers of anyone, i.e. employees whose <code>id</code>
  never appears in <code>employees.manager_id</code>. Return their <code>name</code>.
  (Hint: LEFT JOIN employees to itself on manager_id = id, keep rows where the match is NULL.)`,
  starter:`SELECT e1.name\nFROM employees e1\nLEFT JOIN employees e2 ON e2.manager_id = e1.id\nWHERE e2.id IS NULL;`,
  solution:`SELECT e1.name FROM employees e1 LEFT JOIN employees e2 ON e2.manager_id = e1.id WHERE e2.id IS NULL;`,
  hint:`Self-join employees to itself: e2.manager_id = e1.id, then filter e2.id IS NULL.`
},
{ id:'multi-join', section:'Joins', title:'Joining 3+ tables',
  body:`<p>You can chain multiple JOINs to pull together data spread across several tables.</p>
  <pre class="example">SELECT o.id, c.name AS customer, p.name AS product, oi.quantity
FROM orders o
JOIN customers c ON c.id = o.customer_id
JOIN order_items oi ON oi.order_id = o.id
JOIN products p ON p.id = oi.product_id;</pre>`,
  task:`For order <code>id = 9</code>, list the product <code>name</code> and <code>quantity</code> purchased,

/* ---------- state ---------- */
let db, currentLessonId = LESSONS[0].id;
const progressKey = 'sqlcourse_progress_v1';
let progress = JSON.parse(localStorage.getItem(progressKey) || '{}');

function saveProgress(){ localStorage.setItem(progressKey, JSON.stringify(progress)); }

function resetDb(){
  db = new SQL.Database();
  db.run(SCHEMA_SQL);
}

function rowsToObjects(result){
  if(!result || !result.length) return {columns:[], rows:[]};
  return {columns: result[0].columns, rows: result[0].values};
}

function normalizeRows(columns, rows){
  return rows.map(r => JSON.stringify(r.map(v => v === null ? null : (typeof v === 'number' ? v : String(v)))))
              .sort();
}

function renderTable(columns, rows){
  if(!columns.length) return '<p style="color:var(--dim)">(no rows returned)</p>';
  let html = '<table class="result"><thead><tr>' +
    columns.map(c=>`<th>${escapeHtml(c)}</th>`).join('') + '</tr></thead><tbody>';
  for(const row of rows){
    html += '<tr>' + row.map(v=>`<td>${v===null?'<i style="color:var(--dim)">NULL</i>':escapeHtml(String(v))}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  return `<div class="tablewrap">${html}</div>`;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity = 0; }, 1800);
}

/* ---------- sidebar ---------- */
function renderSidebar(){
  const list = document.getElementById('lesson-list');
  let html = '';
  let lastSection = null;
  for(const lesson of LESSONS){
    if(lesson.section !== lastSection){
      html += `<div class="section-title">${lesson.section}</div>`;
      lastSection = lesson.section;
    }
    const done = !!progress[lesson.id];
    html += `<div class="lesson-item ${lesson.id===currentLessonId?'active':''}" data-id="${lesson.id}">
      <span class="check ${done?'done':''}">${done?'✓':''}</span>${lesson.title}</div>`;
  }
  list.innerHTML = html;
  list.querySelectorAll('.lesson-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      loadLesson(el.dataset.id);
      if(window.innerWidth <= 768) toggleSidebar(false);
    });
  });
  const total = LESSONS.filter(l=>!l.noCheck).length;
  const done = LESSONS.filter(l=>!l.noCheck && progress[l.id]).length;
  document.getElementById('progress-text').textContent = `${done}/${total}`;
  document.getElementById('progress-fill').style.width = total? `${(done/total)*100}%` : '0%';
}

/* ---------- schema panel ---------- */
function renderSchemaPanel(){
  const tables = [
    ['departments', ['id','name','location']],
    ['employees', ['id','name','department_id','manager_id','salary','hire_date']],
    ['customers', ['id','name','city','country']],
    ['products', ['id','name','category','price']],
    ['orders', ['id','customer_id','employee_id','order_date','status']],
    ['order_items', ['id','order_id','product_id','quantity','unit_price']],
  ];
  let html = '<h3 style="margin-top:0">Database Schema</h3>';
  for(const [name, cols] of tables){
    html += `<div class="tbl-def">
      <div class="tbl-def-head">
        <h4>${name}</h4>
        <button class="preview-btn" data-table="${name}">👁 view data</button>
      </div>
      <ul>${cols.map(c=>`<li>${c}</li>`).join('')}</ul>
      <div class="preview-wrap" id="preview-${name}"></div>
    </div>`;
  }
  document.getElementById('schema-panel').innerHTML = html;
  document.querySelectorAll('.preview-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> togglePreview(btn.dataset.table));
  });
}
function togglePreview(table){
  const wrap = document.getElementById(`preview-${table}`);
  const showing = wrap.classList.contains('shown');
  if(showing){
    wrap.classList.remove('shown');
    document.getElementById('schema-panel').classList.remove('wide');
    return;
  }
  document.querySelectorAll('.preview-wrap.shown').forEach(w=>w.classList.remove('shown'));
  try{
    const {columns, rows} = rowsToObjects(db.exec(`SELECT * FROM ${table} LIMIT 100`));
    wrap.innerHTML = renderTable(columns, rows) +
      `<p style="color:var(--dim);font-size:11px;margin:4px 0 0">showing up to 100 rows, live from the database</p>`;
  }catch(err){
    wrap.innerHTML = `<div class="feedback err">⚠ ${escapeHtml(err.message)}</div>`;
  }
  wrap.classList.add('shown');
  document.getElementById('schema-panel').classList.add('wide');
}
function toggleSchema(){
  document.getElementById('schema-panel').classList.toggle('open');
}
function toggleSidebar(force){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const open = typeof force === 'boolean' ? force : !sidebar.classList.contains('open');
  sidebar.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
}

/* ---------- lesson rendering ---------- */
function loadLesson(id){
  currentLessonId = id;
  const lesson = LESSONS.find(l=>l.id===id);
  renderSidebar();
  const main = document.getElementById('main');
  main.innerHTML = `
    <h2>${lesson.title}</h2>
    <div class="lesson-body">${lesson.body}</div>
    <div class="task">
      <h3>Exercise</h3>
      <div>${lesson.task}</div>
      <textarea id="editor" spellcheck="false">${lesson.starter || ''}</textarea>
      <div class="btnrow">
        <button id="run-btn">▶ Run</button>
        ${lesson.noCheck ? '' : '<button id="check-btn" class="secondary">✓ Check Answer</button>'}
        ${lesson.noCheck ? '' : '<span class="hint" id="hint-toggle">Show hint</span>'}
        ${lesson.noCheck ? '' : '<span class="hint" id="sol-toggle">Show solution</span>'}
        <button id="nav-prev" class="secondary">← Prev</button>
        <button id="nav-next" class="secondary">Next →</button>
      </div>
      ${lesson.noCheck ? '' : `<div class="hintbox" id="hintbox">💡 ${lesson.hint||''}</div>`}
      ${lesson.noCheck ? '' : `<div class="solbox" id="solbox"><pre class="example">${escapeHtml(lesson.solution||'')}</pre></div>`}
      <div id="result-area"></div>
    </div>
  `;
  document.getElementById('run-btn').addEventListener('click', ()=>runQuery(lesson));
  if(!lesson.noCheck){
    document.getElementById('check-btn').addEventListener('click', ()=>checkAnswer(lesson));
    document.getElementById('hint-toggle').addEventListener('click', (e)=>{
      const box = document.getElementById('hintbox');
      box.style.display = box.style.display==='block' ? 'none' : 'block';
    });
    document.getElementById('sol-toggle').addEventListener('click', (e)=>{
      const box = document.getElementById('solbox');
      box.style.display = box.style.display==='block' ? 'none' : 'block';
    });
  }
  document.getElementById('nav-prev').addEventListener('click', ()=>navLesson(-1));
  document.getElementById('nav-next').addEventListener('click', ()=>navLesson(1));

  const editor = document.getElementById('editor');
  editor.addEventListener('keydown', (e)=>{
    if((e.ctrlKey||e.metaKey) && e.key === 'Enter'){ e.preventDefault(); runQuery(lesson); }
  });
}

function navLesson(delta){
  const idx = LESSONS.findIndex(l=>l.id===currentLessonId);
  const next = LESSONS[idx+delta];
  if(next) loadLesson(next.id);
}

function runQuery(lesson){
  const sql = document.getElementById('editor').value;
  const area = document.getElementById('result-area');
  try{
    const result = db.exec(sql);
    const {columns, rows} = rowsToObjects(result);
    area.innerHTML = renderTable(columns, rows);
  }catch(err){
    area.innerHTML = `<div class="feedback err">⚠ ${escapeHtml(err.message)}</div>`;
  }
}

function checkAnswer(lesson){
  const userSql = document.getElementById('editor').value;
  const area = document.getElementById('result-area');
  try{
    if(lesson.checkMode === 'table'){
      // run user statement(s), then compare table contents to solution's effect
      const before = new SQL.Database();
      before.run(SCHEMA_SQL);
      const after = new SQL.Database();
      after.run(SCHEMA_SQL);
      after.run(userSql);
      const expected = new SQL.Database();
      expected.run(SCHEMA_SQL);
      expected.run(lesson.solution);

      const a = rowsToObjects(after.exec(`SELECT * FROM ${lesson.checkTable}`));
      const e = rowsToObjects(expected.exec(`SELECT * FROM ${lesson.checkTable}`));
      const aNorm = normalizeRows(a.columns, a.rows);
      const eNorm = normalizeRows(e.columns, e.rows);
      const ok = JSON.stringify(aNorm) === JSON.stringify(eNorm);
      area.innerHTML = renderTable(a.columns, a.rows);
      showFeedback(area, ok, lesson);
      return;
    }

    const userResult = rowsToObjects(db.exec(userSql));
    const solResult = rowsToObjects(db.exec(lesson.solution));
    area.innerHTML = renderTable(userResult.columns, userResult.rows);

    const sameColCount = userResult.columns.length === solResult.columns.length;
    const userNorm = normalizeRows(userResult.columns, userResult.rows);
    const solNorm = normalizeRows(solResult.columns, solResult.rows);
    const ok = sameColCount && JSON.stringify(userNorm) === JSON.stringify(solNorm);
    showFeedback(area, ok, lesson);
  }catch(err){
    area.innerHTML = `<div class="feedback err">⚠ ${escapeHtml(err.message)}</div>`;
  }
}

function showFeedback(area, ok, lesson){
  const fb = document.createElement('div');
  fb.className = 'feedback ' + (ok ? 'ok' : 'err');
  fb.textContent = ok ? '✓ Correct! Nice work.' : '✗ Not quite — compare your output to what\'s expected, or check the hint/solution.';
  area.appendChild(fb);
  if(ok && !progress[lesson.id]){
    progress[lesson.id] = true;
    saveProgress();
    renderSidebar();
    toast('Lesson complete! 🎉');
  }
}

/* ---------- boot ---------- */
function base64ToUint8Array(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

window.initSqlJs({ wasmBinary: base64ToUint8Array(window.SQL_WASM_BASE64) }).then(SQLlib => {
  window.SQL = SQLlib;
  resetDb();
  renderSidebar();
  renderSchemaPanel();
  loadLesson(currentLessonId);
}).catch(err=>{
  document.getElementById('main').innerHTML =
    `<div class="loading">Failed to load SQL engine: ${escapeHtml(err.message)}</div>`;
});
